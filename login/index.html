<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Entrar · SVM Seleção Prime</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="/favicon.ico">
<link rel="apple-touch-icon" href="/favicon.ico">
<style>
:root{
  --ink:#0B0806;--ink-2:#15100B;
  --gold:#D9BD84;--gold-mid:#B8874E;--gold-deep:#8A6230;
  --on-dark:#FBF7EF;--on-dark-mut:rgba(251,247,239,.5);
  --hair:rgba(217,189,132,.15);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Montserrat',system-ui,sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:var(--sans);background:var(--ink);color:var(--on-dark);
  min-height:100vh;display:grid;place-items:center;padding:24px;
  -webkit-font-smoothing:antialiased;
  background-image:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(184,135,78,.1),transparent 55%);
}

.card{
  width:100%;max-width:400px;
  display:flex;flex-direction:column;align-items:center;
  gap:0;
}

/* LOGO */
.logo{
  margin-bottom:40px;
  display:flex;flex-direction:column;align-items:center;gap:0;
}
.logo img{height:80px;width:auto;object-fit:contain}

/* TÍTULO */
.card h1{
  font-family:var(--serif);font-weight:300;font-size:28px;
  color:var(--on-dark);text-align:center;margin-bottom:6px;letter-spacing:.02em;
}
.card p{
  font-size:12px;color:var(--on-dark-mut);text-align:center;
  margin-bottom:36px;font-weight:300;line-height:1.6;
}

/* FORM */
form{width:100%;display:flex;flex-direction:column;gap:14px}

.field{display:flex;flex-direction:column;gap:7px}
.field label{
  font-size:9px;letter-spacing:.22em;text-transform:uppercase;
  color:var(--on-dark-mut);font-weight:600;
}
.field input{
  width:100%;padding:14px 16px;
  background:rgba(255,255,255,.05);
  border:1px solid var(--hair);border-radius:3px;
  color:var(--on-dark);font-family:var(--sans);font-size:14px;
  transition:.2s;outline:none;
}
.field input:focus{
  border-color:var(--gold-mid);background:rgba(222,193,121,.06);
  box-shadow:0 0 0 3px rgba(184,135,78,.1);
}
.field input::placeholder{color:rgba(251,247,239,.22)}

.forgot{
  text-align:right;font-size:11px;color:var(--gold-deep);
  text-decoration:none;margin-top:-4px;
  transition:color .2s;
}
.forgot:hover{color:var(--gold-mid)}

.btn-entrar{
  width:100%;padding:15px;border:none;border-radius:3px;cursor:pointer;
  background:linear-gradient(135deg,var(--gold-deep),var(--gold-mid) 45%,var(--gold));
  color:var(--ink);font-family:var(--sans);font-weight:700;
  font-size:10px;letter-spacing:.28em;text-transform:uppercase;
  transition:.25s;margin-top:6px;
}
.btn-entrar:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 8px 24px rgba(184,135,78,.25)}

.divider{
  display:flex;align-items:center;gap:14px;margin:4px 0;
}
.divider::before,.divider::after{content:"";flex:1;height:1px;background:var(--hair)}
.divider span{font-size:10px;letter-spacing:.1em;color:var(--on-dark-mut)}

.btn-cadastro{
  width:100%;padding:14px;border:1px solid var(--hair);border-radius:3px;
  cursor:pointer;background:none;color:var(--on-dark-mut);
  font-family:var(--sans);font-weight:500;font-size:10px;
  letter-spacing:.2em;text-transform:uppercase;transition:.25s;
}
.btn-cadastro:hover{border-color:var(--gold-mid);color:var(--gold)}

.back{
  margin-top:32px;font-size:11px;color:var(--on-dark-mut);
  text-align:center;
}
.back a{color:var(--gold-deep);text-decoration:none;transition:color .2s}
.back a:hover{color:var(--gold-mid)}
</style>
</head>
<body>
<div class="card">

  <div class="logo">
    <img src="/img/logo.png" alt="SVM Seleção Prime">
  </div>

  <h1>Fazer login</h1>
  <p>Acesse sua conta ou crie uma nova<br>para começar a assinar.</p>

  <form onsubmit="entrar(event)">
    <div class="field">
      <label>E-mail</label>
      <input type="email" placeholder="seu@email.com.br" autocomplete="email" required>
    </div>
    <div class="field">
      <label>Senha</label>
      <input type="password" placeholder="••••••••" autocomplete="current-password" required>
    </div>

    <a href="#" class="forgot">Esqueci minha senha</a>

    <button type="submit" class="btn-entrar">Entrar</button>

    <div class="divider"><span>ou</span></div>

    <button type="button" class="btn-cadastro" onclick="window.location.href='/#planos'">
      Criar uma conta
    </button>
  </form>

  <div class="back">
    <a href="/">← Voltar ao site</a>
  </div>

</div>
<script>
function entrar(e){
  e.preventDefault();
  window.location.href='/loja';
}
</script>
</body>
</html>
